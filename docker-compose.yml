services:
  gatecontrol:
    image: gatecontrol:latest
    build: .
    container_name: gatecontrol
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - gatecontrol-data:/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  gatecontrol-data:
