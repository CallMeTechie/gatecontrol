services:
  gatecontrol:
    image: ghcr.io/callmetechie/gatecontrol:latest
    container_name: gatecontrol
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "51820:51820/udp"
    volumes:
      - gatecontrol-data:/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  gatecontrol-data:
