<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow-green"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.25"/></filter>
    <filter id="glow-purple"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a855f7" flood-opacity="0.25"/></filter>
    <filter id="glow-blue"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.25"/></filter>
    <filter id="glow-amber"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.25"/></filter>
  </defs>

  <!-- Background container -->
  <rect x="1" y="1" width="718" height="458" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="2"/>

  <!-- Container label -->
  <rect x="24" y="-2" width="160" height="26" rx="6" fill="#3b82f6"/>
  <text x="104" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="0.5">DOCKER CONTAINER</text>

  <!-- === Caddy Box === -->
  <rect x="30" y="40" width="196" height="190" rx="10" fill="rgba(34,197,94,0.07)" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" filter="url(#glow-green)"/>
  <!-- Icon circle -->
  <rect x="95" y="52" width="40" height="40" rx="9" fill="rgba(34,197,94,0.2)"/>
  <polygon points="115,60 103,67 103,81 115,88 127,81 127,67" fill="none" stroke="#4ade80" stroke-width="1.3"/>
  <line x1="115" y1="88" x2="115" y2="74" stroke="#4ade80" stroke-width="1.3"/>
  <line x1="103" y1="67" x2="115" y2="74" stroke="#4ade80" stroke-width="1.3"/>
  <line x1="127" y1="67" x2="115" y2="74" stroke="#4ade80" stroke-width="1.3"/>
  <!-- Text -->
  <text x="115" y="110" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">Caddy</text>
  <text x="115" y="126" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">:80 / :443</text>
  <!-- Features -->
  <text x="60" y="152" fill="#cbd5e1" font-size="12"><tspan fill="#4ade80" font-weight="700">› </tspan>HTTPS</text>
  <text x="60" y="172" fill="#cbd5e1" font-size="12"><tspan fill="#4ade80" font-weight="700">› </tspan>Reverse Proxy</text>
  <text x="60" y="192" fill="#cbd5e1" font-size="12"><tspan fill="#4ade80" font-weight="700">› </tspan>Let's Encrypt</text>
  <text x="60" y="212" fill="#cbd5e1" font-size="12"><tspan fill="#4ade80" font-weight="700">› </tspan>Auto Certificates</text>

  <!-- === WireGuard Box === -->
  <rect x="258" y="40" width="196" height="190" rx="10" fill="rgba(168,85,247,0.07)" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1.5" filter="url(#glow-purple)"/>
  <rect x="328" y="52" width="40" height="40" rx="9" fill="rgba(168,85,247,0.2)"/>
  <circle cx="348" cy="72" r="12" fill="none" stroke="#c084fc" stroke-width="1.3"/>
  <polyline points="342,72 346,76 354,66" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="348" y="110" text-anchor="middle" fill="#c084fc" font-size="15" font-weight="700">WireGuard</text>
  <text x="348" y="126" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">:51820 (UDP)</text>
  <text x="288" y="152" fill="#cbd5e1" font-size="12"><tspan fill="#c084fc" font-weight="700">› </tspan>VPN Tunnel</text>
  <text x="288" y="172" fill="#cbd5e1" font-size="12"><tspan fill="#c084fc" font-weight="700">› </tspan>Peer Management</text>
  <text x="288" y="192" fill="#cbd5e1" font-size="12"><tspan fill="#c084fc" font-weight="700">› </tspan>Key Exchange</text>
  <text x="288" y="212" fill="#cbd5e1" font-size="12"><tspan fill="#c084fc" font-weight="700">› </tspan>Hot Reload</text>

  <!-- === Node.js Box === -->
  <rect x="486" y="40" width="204" height="190" rx="10" fill="rgba(59,130,246,0.07)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5" filter="url(#glow-blue)"/>
  <rect x="560" y="52" width="40" height="40" rx="9" fill="rgba(59,130,246,0.2)"/>
  <rect x="568" y="60" width="24" height="24" rx="4" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
  <line x1="574" y1="72" x2="586" y2="72" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="580" y1="66" x2="580" y2="78" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round"/>
  <text x="580" y="110" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="700">Node.js</text>
  <text x="580" y="126" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">:3000 (Express)</text>
  <text x="516" y="152" fill="#cbd5e1" font-size="12"><tspan fill="#60a5fa" font-weight="700">› </tspan>Web UI</text>
  <text x="516" y="172" fill="#cbd5e1" font-size="12"><tspan fill="#60a5fa" font-weight="700">› </tspan>REST API</text>
  <text x="516" y="192" fill="#cbd5e1" font-size="12"><tspan fill="#60a5fa" font-weight="700">› </tspan>Background Tasks</text>
  <text x="516" y="212" fill="#cbd5e1" font-size="12"><tspan fill="#60a5fa" font-weight="700">› </tspan>Auth &amp; Security</text>

  <!-- Flow arrows: Caddy ← WireGuard -->
  <line x1="226" y1="135" x2="253" y2="135" stroke="#475569" stroke-width="2"/>
  <polygon points="230,131 222,135 230,139" fill="#475569"/>

  <!-- Flow arrows: WireGuard ← Node.js -->
  <line x1="454" y1="135" x2="481" y2="135" stroke="#475569" stroke-width="2"/>
  <polygon points="458,131 450,135 458,139" fill="#475569"/>

  <!-- Connection line Node → SQLite -->
  <line x1="580" y1="230" x2="580" y2="262" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="576,260 580,270 584,260" fill="#f59e0b" opacity="0.7"/>

  <!-- === SQLite Box === -->
  <rect x="490" y="272" width="180" height="68" rx="10" fill="rgba(245,158,11,0.07)" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5" filter="url(#glow-amber)"/>
  <rect x="510" y="284" width="36" height="36" rx="8" fill="rgba(245,158,11,0.2)"/>
  <ellipse cx="528" cy="294" rx="10" ry="4" fill="none" stroke="#fbbf24" stroke-width="1.2"/>
  <path d="M518,294 v14 c0,2.2 4.5,4 10,4 s10,-1.8 10,-4 v-14" fill="none" stroke="#fbbf24" stroke-width="1.2"/>
  <path d="M518,302 c0,2.2 4.5,4 10,4 s10,-1.8 10,-4" fill="none" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="580" y="300" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">SQLite</text>
  <text x="580" y="318" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">(WAL Mode)</text>

  <!-- === Volume Section === -->
  <rect x="30" y="370" width="660" height="76" rx="9" fill="rgba(100,116,139,0.08)" stroke="#475569" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Folder icon -->
  <path d="M44,382 h8 l2,-3 h10 a2,2 0 0 1 2,2 v12 a2,2 0 0 1 -2,2 h-20 a2,2 0 0 1 -2,-2 v-9 a2,2 0 0 1 2,-2z" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="72" y="393" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="0.5">VOLUME: /data</text>

  <!-- Volume entries -->
  <text x="50" y="418" fill="#fbbf24" font-size="12" font-family="monospace">gatecontrol.db</text>
  <text x="170" y="418" fill="#64748b" font-size="11">── database</text>

  <text x="280" y="418" fill="#fbbf24" font-size="12" font-family="monospace">wireguard/</text>
  <text x="380" y="418" fill="#64748b" font-size="11">── configs &amp; keys</text>

  <text x="50" y="438" fill="#fbbf24" font-size="12" font-family="monospace">caddy/</text>
  <text x="170" y="438" fill="#64748b" font-size="11">── certs &amp; cache</text>

  <text x="280" y="438" fill="#fbbf24" font-size="12" font-family="monospace">.encryption_key</text>
  <text x="400" y="438" fill="#64748b" font-size="11">── AES-256 key</text>
</svg>
