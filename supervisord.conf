[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
user=root

[program:caddy]
command=/bin/sh -c "caddy run --config /app/config/Caddyfile --adapter caddyfile 2>&1 | tee -a /data/caddy/caddy-stdout.log"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10
environment=XDG_DATA_HOME="/data/caddy"

[program:wireguard]
command=/app/scripts/wg-wrapper.sh
autostart=true
autorestart=unexpected
exitcodes=0
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=3
priority=20
environment=GC_WG_INTERFACE="%(ENV_GC_WG_INTERFACE)s"

; Split-horizon DNS: hijacks GC_WG_HOST → GC_WG_GATEWAY_IP for VPN peers
; so API traffic flows through the tunnel instead of via WireGuard's
; endpoint-route exception (which otherwise bypasses the tunnel and
; fails when the client's physical network cannot reach the public IP
; directly). bind-dynamic waits for wg0 to come up before listening.
[program:dnsmasq]
command=dnsmasq --keep-in-foreground --conf-file=/app/config/dnsmasq.conf
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=2
priority=25

[program:node]
command=node /app/src/server.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
startretries=5
startsecs=3
